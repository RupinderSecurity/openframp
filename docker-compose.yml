version: "3.8"

services:
  scanner:
    build: .
    volumes:
      - ~/.aws:/home/scanner/.aws:ro
      - scan-results:/home/scanner/openframp/oscal
    entrypoint: ["tail", "-f", "/dev/null"]

  web:
    build: ./web
    ports:
      - "3000:3000"
    volumes:
      - scan-results:/data
    depends_on:
      - scanner

volumes:
  scan-results: